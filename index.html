<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Section</title>
  <style>
    .about-section {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px;
      background-color: #f9f9f9;
    }

    .about-image {
      flex: 1;
      padding: 20px;
    }

    .about-image img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .about-text {
      flex: 1;
      padding: 20px;
    }

    .about-text h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .about-text p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #555;
    }

    @media (max-width: 768px) {
      .about-section {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <section class="about-section">
    <div class="about-image">
      <img src="https://via.placeholder.com/500x300" alt="About Us" />
    </div>
    <div class="about-text">
      <h2>About Us</h2>
      <p>
        Welcome to our website! We are passionate about delivering high-quality products and excellent service.
        Our mission is to help you achieve your goals with innovation and dedication.
      </p>
    </div>
  </section>

</body>
</html>
